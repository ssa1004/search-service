{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "search-service.fullname" . }}
  labels:
    {{- include "search-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "search-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── ingress controller 만 8080 으로 진입 허용 ──
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
  egress:
    # ── DNS — kube-system 의 coredns 가 보통 의 위치. namespace 가 environment 마다
    # 다를 수 있어 namespaceSelector 빈 set ({}) 으로 모든 namespace 허용. 보안 강화가 필요하면
    # kube-system 만 selector 로 제한.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: {{ .Values.networkPolicy.egress.dnsPort }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.dnsPort }}
    # ── PostgreSQL ──
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.postgresPort }}
    # ── OpenSearch ──
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.opensearchPort }}
    # ── Kafka ──
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.kafkaPort }}
    {{- if .Values.redis.enabled }}
    # ── Redis (현 단계 미사용 — 활성 시만 egress 허용) ──
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.redisPort }}
    {{- end }}
{{- end }}
