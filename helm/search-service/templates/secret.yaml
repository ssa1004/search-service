{{- /*
secret 은 placeholder 만 — 운영은 ExternalSecrets / sealed-secrets / vault 가 만든
secret 을 그대로 envFrom 으로 참조한다.
secret.create=true 인 경우에만 chart 가 dev / 로컬용 secret 을 생성.
*/ -}}
{{- if .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "search-service.postgresSecretName" . }}
  labels:
    {{- include "search-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.postgres.passwordKey }}: {{ .Values.secret.postgres.password | quote }}
{{- end }}
