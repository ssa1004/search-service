apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "search-service.fullname" . }}
  labels:
    {{- include "search-service.labels" . | nindent 4 }}
spec:
  {{- /* HPA 가 켜져 있으면 replicas 를 비워서 controller race 회피. */ -}}
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "search-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "search-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # ConfigMap 변경 시 pod rollout — checksum 으로 spec 자체가 바뀌어 rolling update.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "search-service.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      # Graceful shutdown 예산 (ADR-0011) — preStop 5s + Spring graceful 25s = 30s.
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: app
          image: {{ include "search-service.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "search-service.fullname" . }}-config
          {{- /*
          env block 은 secret 참조가 하나라도 있을 때만 emit — 빈 env: 키는 k8s 가 거부.
          */ -}}
          {{- $pgSecret := include "search-service.postgresSecretName" . -}}
          {{- if or .Values.opensearch.auth.enabled $pgSecret }}
          env:
            {{- if .Values.opensearch.auth.enabled }}
            # ── OpenSearch credentials — 외부 secret (ExternalSecrets / sealed-secrets) 참조 ──
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.opensearch.auth.existingSecret }}
                  key: {{ .Values.opensearch.auth.usernameKey }}
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.opensearch.auth.existingSecret }}
                  key: {{ .Values.opensearch.auth.passwordKey }}
            {{- end }}
            {{- if $pgSecret }}
            # ── Postgres password — chart 가 만든 placeholder 또는 외부 secret ──
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecret }}
                  key: {{ .Values.secret.postgres.passwordKey }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # ── 3종 probe (ADR-0010) ──
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          # preStop sleep — endpoint 갱신이 kube-proxy 까지 전파되는 동안 in-flight 요청 처리.
          # 이후 Spring graceful shutdown 이 in-flight drain (lifecycle.timeout-per-shutdown-phase=25s).
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.gracefulShutdown.preStopSleepSeconds }}"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          # readOnlyRootFilesystem=true 이므로 tmpfs 가 반드시 필요.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
