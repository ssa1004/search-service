apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "search-service.fullname" . }}-config
  labels:
    {{- include "search-service.labels" . | nindent 4 }}
data:
  # ── Spring profile / 검색 모드 ──
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfilesActive | quote }}
  SEARCH_ENGINE: {{ .Values.config.searchEngine | quote }}
  SEARCH_KAFKA_ENABLED: {{ .Values.config.kafkaEnabled | quote }}

  # ── 도메인 ──
  SEARCH_ALIAS: {{ .Values.config.alias | quote }}
  SEARCH_REINDEX_BATCH_SIZE: {{ .Values.config.reindexBatchSize | quote }}
  SEARCH_CDC_TOPIC: {{ .Values.config.cdcTopic | quote }}
  SEARCH_ALERT_TOPIC: {{ .Values.config.alertTopic | quote }}

  # ── OpenSearch / Kafka endpoint ──
  ELASTICSEARCH_HOST: {{ .Values.opensearch.endpoint | quote }}
  KAFKA_BOOTSTRAP: {{ .Values.kafka.bootstrap | quote }}

  # ── PostgreSQL ──
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}

  # ── Redis (현 단계 미사용 — 동의어 cache / ratelimit placeholder) ──
  REDIS_ENABLED: {{ .Values.redis.enabled | quote }}
  {{- if .Values.redis.enabled }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  {{- end }}
