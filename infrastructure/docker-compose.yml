services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: search
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "search"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    # nori (한국어 형태소) 플러그인 포함 — products-mapping.json 의 ko_standard 가 nori_tokenizer
    # 의존 (ADR-0015). docker/elasticsearch.Dockerfile 에서 elasticsearch-plugin install.
    build:
      context: ../docker/elasticsearch
      dockerfile: Dockerfile
    image: search-service/elasticsearch-nori:8.15.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E 'green|yellow'"]
      interval: 5s
      timeout: 3s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kafka:
    image: bitnami/kafka:3.8
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      # 두 listener 로 분리 — 호스트에서 ./gradlew bootRun 으로 띄운 앱(localhost:9092)과
      # 컨테이너 내부 서비스(kafka:29092)가 둘 다 붙을 수 있게.
      #   EXTERNAL  : 호스트 → localhost:9092  (앱 기본값 KAFKA_BOOTSTRAP=localhost:9092 와 일치)
      #   INTERNAL  : 컨테이너 끼리 → kafka:29092 (broker 간 통신도 INTERNAL)
      # 단일 listener(advertised: kafka:9092)면 호스트가 kafka 호스트명을 못 풀어
      # CdcOutboxRelay producer 가 hang/실패한다 (CDC 색인이 멈추는 흔한 함정).
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    ports:
      - "8081:8080"
    depends_on:
      - kafka
