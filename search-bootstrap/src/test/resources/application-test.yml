# 단위 / 통합 테스트 전용 override.
#
# 운영 application.yml 의 HikariCP 설정 (leak-detection-threshold=30s, max-lifetime=29분 등)
# 은 짧은 lifecycle 의 테스트와 안 맞는다 — Testcontainers shutdown 직전 trim 이 leak 경고로
# 잡히거나, Spring 테스트의 SqlScript 가 30초 넘기면 false positive.
spring:
  datasource:
    hikari:
      # 테스트는 trace + 빠른 fail 우선 — leak detection 비활성, pool 작게.
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 2000
      leak-detection-threshold: 0       # 비활성
      max-lifetime: 600000              # 10분 (기본값 수준으로 짧게)
      keepalive-time: 0                 # 비활성
