---
# Backstage Software Catalog 정의 — search-service component + search-rest API.
# system 정의는 ssa1004/auth-service 레포에 있다.

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: search-service
  description: "검색 백엔드 — Elasticsearch 기반 hexagonal. Saved Search alert, synonym dictionary hot reload, 한국어(nori) analyzer"
  annotations:
    github.com/project-slug: ssa1004/search-service
    backstage.io/source-location: url:https://github.com/ssa1004/search-service
  tags:
    - search
    - elasticsearch
    - saved-search
    - synonym
    - korean-analyzer
    - hexagonal-architecture
  links:
    - url: https://github.com/ssa1004/search-service
      title: GitHub Repository
    - url: https://github.com/ssa1004/search-service/blob/main/README.md
      title: README
    - url: https://github.com/ssa1004/search-service/tree/main/docs/adr
      title: ADRs
spec:
  type: service
  lifecycle: experimental
  owner: user:ssa1004
  system: ssa1004-portfolio
  providesApis:
    - search-rest
  dependsOn:
    - component:auth-service

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: search-rest
  description: "검색 / 자동완성 / 관련검색어 / synonym 관리 REST API (Elasticsearch 백엔드)"
  annotations:
    github.com/project-slug: ssa1004/search-service
spec:
  type: openapi
  lifecycle: experimental
  owner: user:ssa1004
  system: ssa1004-portfolio
  # 요약 스펙 — 전체 OpenAPI 는 springdoc 가 런타임에 /swagger-ui.html 로 생성한다.
  definition: |
    openapi: 3.0.3
    info:
      title: Search Service REST API
      version: 1.0.0
      description: |
        Elasticsearch 기반 검색 백엔드.
        한국어(nori) analyzer + synonym hot reload + saved search alert 지원.
    paths:
      /api/v1/search/products:
        post:
          summary: 키워드 검색 (filter + facet + function_score boost)
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    keyword: { type: string }
                    filters: { type: array, items: { type: object } }
                    facets: { type: array, items: { type: object } }
                    sort: { type: object }
                    page: { type: integer, default: 0 }
                    size: { type: integer, default: 20 }
          responses:
            "200":
              description: 검색 결과 + facet 분포
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      totalHits: { type: integer }
                      took: { type: integer }
                      hits: { type: array, items: { type: object } }
                      facets: { type: object }
      /api/v1/search/autocomplete:
        get:
          summary: 자동완성 (prefix + edge-ngram)
          parameters:
            - in: query
              name: q
              required: true
              schema: { type: string }
            - in: query
              name: limit
              schema: { type: integer, default: 10 }
          responses:
            "200": { description: 자동완성 후보 }
      /api/v1/search/related:
        get:
          summary: 관련 검색어 (fuzzy — zero-result 회복)
          parameters:
            - in: query
              name: q
              required: true
              schema: { type: string }
            - in: query
              name: limit
              schema: { type: integer, default: 5 }
            - in: query
              name: maxDistance
              schema: { type: integer, default: 2 }
          responses:
            "200": { description: 관련 키워드 후보 }
      /api/v1/admin/synonyms:
        post:
          summary: 동의어 그룹 등록 (운영자 — X-Operator-Id 헤더)
          parameters:
            - in: header
              name: X-Operator-Id
              required: true
              schema: { type: string }
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [terms, direction]
                  properties:
                    terms:
                      type: array
                      items: { type: string, example: "스마트폰" }
                    direction:
                      type: string
                      enum: [BIDIRECTIONAL, ONE_WAY]
          responses:
            "201": { description: 동의어 그룹 등록 완료 }
      /api/v1/admin/synonyms/apply:
        post:
          summary: 등록된 동의어를 ES 에 적용 (settings update + alias swap)
          responses:
            "200": { description: 적용된 그룹 수 }
