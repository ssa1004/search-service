---
# Backstage Software Catalog 정의 — search-service component + search-rest API.
# system 정의는 ssa1004/auth-service 레포에 있다.

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: search-service
  description: "검색 백엔드 — OpenSearch 기반 hexagonal. Saved Search alert, synonym dictionary hot reload, cursor pagination, 다국어 analyzer"
  annotations:
    github.com/project-slug: ssa1004/search-service
    backstage.io/source-location: url:https://github.com/ssa1004/search-service
  tags:
    - search
    - opensearch
    - saved-search
    - synonym
    - cursor-pagination
    - multilingual-analyzer
    - hexagonal-architecture
  links:
    - url: https://github.com/ssa1004/search-service
      title: GitHub Repository
    - url: https://github.com/ssa1004/search-service/blob/main/README.md
      title: README
    - url: https://github.com/ssa1004/search-service/tree/main/docs/adr
      title: ADRs
spec:
  type: service
  lifecycle: experimental
  owner: user:ssa1004
  system: ssa1004-portfolio
  providesApis:
    - search-rest
  dependsOn:
    - component:auth-service

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: search-rest
  description: "검색 / 자동완성 / saved search / synonym 관리 REST API (OpenSearch 백엔드)"
  annotations:
    github.com/project-slug: ssa1004/search-service
spec:
  type: openapi
  lifecycle: experimental
  owner: user:ssa1004
  system: ssa1004-portfolio
  definition: |
    openapi: 3.0.3
    info:
      title: Search Service REST API
      version: 1.0.0
      description: |
        OpenSearch 기반 검색 백엔드.
        다국어 analyzer + synonym hot reload + cursor pagination + saved search alert 지원.
    paths:
      /api/v1/search:
        get:
          summary: 검색 (cursor pagination)
          parameters:
            - in: query
              name: q
              required: true
              schema: { type: string }
            - in: query
              name: cursor
              schema: { type: string }
            - in: query
              name: size
              schema: { type: integer, default: 20 }
            - in: query
              name: filter
              schema: { type: string, description: "field:value AND field:value" }
          responses:
            "200":
              description: 검색 결과
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      hits:
                        type: array
                        items: { type: object }
                      nextCursor: { type: string }
                      totalApprox: { type: integer }
      /api/v1/autocomplete:
        get:
          summary: 자동완성 (prefix + edge-ngram)
          parameters:
            - in: query
              name: prefix
              required: true
              schema: { type: string }
          responses:
            "200": { description: 자동완성 후보 }
      /api/v1/saved-searches:
        post:
          summary: Saved Search 등록 (주기 평가 + alert)
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [query, schedule]
                  properties:
                    query: { type: string }
                    schedule: { type: string, description: cron expression }
                    notificationChannel: { type: string }
          responses:
            "201": { description: saved search 등록 완료 }
      /api/v1/synonyms:
        put:
          summary: synonym dictionary hot reload
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    entries:
                      type: array
                      items: { type: string, example: "스마트폰, 휴대폰, 핸드폰" }
          responses:
            "204": { description: reload 완료 }
