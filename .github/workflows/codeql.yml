name: codeql

# Kotlin / Java SAST — CodeQL 정적 분석. ci.yml 과 분리해 보안 스캔만 독립 실행한다.
on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 — dependabot 갱신과 같은 주기로 코드 스캔도 돈다.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

# 같은 ref 의 중복 스캔 취소 — 수동 dispatch 연타 / 재실행 시 runner 낭비 방지.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: java-kotlin

      # autobuild 대신 명시 빌드 — 멀티 모듈 Gradle 을 CodeQL 이 정확히 잡도록.
      - name: Build
        run: ./gradlew classes testClasses --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
