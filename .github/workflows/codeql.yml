name: codeql

# Java SAST — CodeQL 정적 분석. ci.yml 과 분리해 보안 스캔만 독립 실행한다.
on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 — dependabot 갱신과 같은 주기로 코드 스캔도 돈다.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      # autobuild 대신 명시 빌드 — 멀티 모듈 Gradle 을 CodeQL 이 정확히 잡도록.
      - name: Build
        run: ./gradlew classes testClasses --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
