name: codeql

# Kotlin / Java SAST — CodeQL 정적 분석. ci.yml 과 분리해 보안 스캔만 독립 실행한다.
on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 — dependabot 갱신과 같은 주기로 코드 스캔도 돈다.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

# 같은 ref 의 중복 스캔 취소 — 수동 dispatch 연타 / 재실행 시 runner 낭비 방지.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java-kotlin

      # autobuild 대신 명시 빌드 — 멀티 모듈 Gradle 을 CodeQL 이 정확히 잡도록.
      - name: Build
        run: ./gradlew classes testClasses --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
