name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 최소 권한 — CI 는 source 만 읽으면 충분. 토큰 노출 면적 축소.
permissions:
  contents: read

# 같은 ref 의 in-flight run 을 취소 — PR 에 연달아 push 시 runner 낭비 방지.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Unit tests (default — integration 제외)
        run: ./gradlew check --no-daemon

      - name: Coverage — Kover aggregate report
        # 단위 테스트 기준 production 모듈 커버리지 집계. 로그로 % 를 남기고
        # XML/HTML 리포트를 아티팩트로 올린다 (배지는 README 의 Kover 라벨 참고).
        run: ./gradlew koverXmlReport koverHtmlReport koverLog --no-daemon

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kover-coverage
          path: |
            build/reports/kover/report.xml
            build/reports/kover/html
          if-no-files-found: warn

      - name: Integration tests (Testcontainers ES + Postgres + Kafka)
        run: ./gradlew integrationTest --no-daemon
        # docker / Testcontainers 가 GitHub runner 에 기본 설치되어 있음.
        # 무거우면 별도 job 으로 분리 가능.

  # Helm chart + raw k8s manifest 정적 검증 — gradle/docker 없이 빠르게 도는 독립 job.
  # helm lint (dev + prod) 로 차트 문법을, helm template | kubeconform 으로 렌더된
  # manifest 가 실제 k8s 스키마에 맞는지 schema-validate 한다.
  infra-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.2

      # helm-unittest — 렌더된 manifest 의 securityContext / probe / resource / HPA toggle 를
      # 단언으로 고정. helm template 만으로는 잡지 못하는 회귀를 막는다.
      # 공식 helm-unittest 이미지로 실행 — helm 과 plugin 버전을 한 쌍으로 고정한다.
      # CI 의 helm 으로는 `helm plugin install` 시 1.1.x 가 unusable
      # ("unknown field platformHooks") 였다. 이 이미지는 helm 3.20.2 + plugin 1.1.0
      # 을 핀하며, /apps 가 작업 디렉터리이므로 차트 경로는 repo 기준 상대경로다.
      - name: helm unittest
        # --user 0: run as root so helm-unittest can write tests/__snapshot__ into
        # the bind-mounted (runner-owned) workspace.
        run: |
          docker run --rm --user 0 -v "${{ github.workspace }}:/apps" \
            helmunittest/helm-unittest:3.20.2-1.1.0 \
            helm/search-service

      - name: Install kubeconform
        run: |
          curl -sSLf https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: helm lint (dev + prod values)
        run: |
          helm lint helm/search-service
          helm lint helm/search-service -f helm/search-service/values-prod.yaml

      - name: helm template | kubeconform (dev + prod)
        run: |
          helm template search helm/search-service \
            | kubeconform -strict -summary -kubernetes-version 1.30.0 \
                -schema-location default -ignore-missing-schemas
          helm template search helm/search-service -f helm/search-service/values-prod.yaml \
            | kubeconform -strict -summary -kubernetes-version 1.30.0 \
                -schema-location default -ignore-missing-schemas

      - name: kubeconform — raw k8s manifests (infrastructure/k8s)
        run: |
          kubeconform -strict -summary -kubernetes-version 1.30.0 \
            -schema-location default -ignore-missing-schemas \
            infrastructure/k8s/

  build-image:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    permissions:
      contents: read
      # Trivy SARIF 결과를 Security 탭(code scanning) 에 업로드하기 위한 권한.
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build image (no push — 빌드 검증만)
        run: docker build -f infrastructure/Dockerfile -t search-service:${{ github.sha }} .

      # 빌드된 이미지의 OS/라이브러리 취약점을 게이팅 — fixable HIGH/CRITICAL 발견 시 빌드 실패.
      # 결과는 SARIF 로도 떨궈 Security 탭(code scanning) 에 누적, 시간순 추적이 가능하게 한다.
      # @master 같은 mutable ref 는 공급망 취약점 — SHA 로 고정.
      - name: Trivy image scan (게이팅 + SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: image
          image-ref: search-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy SARIF to Security tab
        # 업로드 실패(권한/포크 PR 등) 가 빌드 전체를 깨지 않게 — 게이팅은 위 scan 의 exit-code 가 한다.
        # 스캔이 게이팅으로 실패해도 SARIF 는 올려 추적이 끊기지 않게 if: always().
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy-container
