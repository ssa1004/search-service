name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 최소 권한 — CI 는 source 만 읽으면 충분. 토큰 노출 면적 축소.
permissions:
  contents: read

# 같은 ref 의 in-flight run 을 취소 — PR 에 연달아 push 시 runner 낭비 방지.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Unit tests (default — integration 제외)
        run: ./gradlew check --no-daemon

      - name: Coverage — Kover aggregate report
        # 단위 테스트 기준 production 모듈 커버리지 집계. 로그로 % 를 남기고
        # XML/HTML 리포트를 아티팩트로 올린다 (배지는 README 의 Kover 라벨 참고).
        run: ./gradlew koverXmlReport koverHtmlReport koverLog --no-daemon

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kover-coverage
          path: |
            build/reports/kover/report.xml
            build/reports/kover/html
          if-no-files-found: warn

      - name: Integration tests (Testcontainers ES + Postgres + Kafka)
        run: ./gradlew integrationTest --no-daemon
        # docker / Testcontainers 가 GitHub runner 에 기본 설치되어 있음.
        # 무거우면 별도 job 으로 분리 가능.

  # Helm chart + raw k8s manifest 정적 검증 — gradle/docker 없이 빠르게 도는 독립 job.
  # helm lint (dev + prod) 로 차트 문법을, helm template | kubeconform 으로 렌더된
  # manifest 가 실제 k8s 스키마에 맞는지 schema-validate 한다.
  infra-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.2

      # helm-unittest — 렌더된 manifest 의 securityContext / probe / resource / HPA toggle 를
      # 단언으로 고정. helm template 만으로는 잡지 못하는 회귀를 막는다.
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 1.1.1

      - name: helm unittest
        run: helm unittest helm/search-service

      - name: Install kubeconform
        run: |
          curl -sSLf https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: helm lint (dev + prod values)
        run: |
          helm lint helm/search-service
          helm lint helm/search-service -f helm/search-service/values-prod.yaml

      - name: helm template | kubeconform (dev + prod)
        run: |
          helm template search helm/search-service \
            | kubeconform -strict -summary -kubernetes-version 1.30.0 \
                -schema-location default -ignore-missing-schemas
          helm template search helm/search-service -f helm/search-service/values-prod.yaml \
            | kubeconform -strict -summary -kubernetes-version 1.30.0 \
                -schema-location default -ignore-missing-schemas

      - name: kubeconform — raw k8s manifests (infrastructure/k8s)
        run: |
          kubeconform -strict -summary -kubernetes-version 1.30.0 \
            -schema-location default -ignore-missing-schemas \
            infrastructure/k8s/

  build-image:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image (no push — 빌드 검증만)
        run: docker build -f infrastructure/Dockerfile -t search-service:${{ github.sha }} .
